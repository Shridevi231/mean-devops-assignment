version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: shridevi231/mean-backend:latest
    container_name: backend_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  frontend:
    image: shridevi231/mean-frontend:latest
    container_name: frontend_app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - backend

volumes:
  mongo_data:
